name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish (e.g. v0.1.8)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-plugin-zip:
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build plugin ZIP
        run: |
          # Create the plugin ZIP with the correct structure:
          # addons/open_godot_mcp/... (all addon files)
          # Exclude .uid files for .tscn/.gd that are editor-specific
          # but keep .uid files so Godot 4.5+ can resolve quickly.
          cd "$GITHUB_WORKSPACE"
          zip -r open-godot-mcp-plugin.zip \
            addons/open_godot_mcp/ \
            -x "addons/open_godot_mcp/*.bak.*" \
            -x "addons/open_godot_mcp/**/*.bak.*"

      - name: Generate SHA-256 checksum
        run: |
          sha256sum open-godot-mcp-plugin.zip > open-godot-mcp-plugin.zip.sha256

      - name: Upload plugin ZIP to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            open-godot-mcp-plugin.zip
            open-godot-mcp-plugin.zip.sha256

  publish-to-asset-library:
    needs: build-plugin-zip
    if: always() && (github.event_name == 'workflow_dispatch' || needs.build-plugin-zip.result == 'success')
    runs-on: ubuntu-latest
    name: Publish to Godot Asset Library
    steps:
      - uses: actions/checkout@v4

      - name: Extract version and build asset template
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          VERSION="${TAG#v}"
          # Fetch release body (raw text with real newlines)
          RELEASE_BODY=$(gh release view "$TAG" --json body | jq -r '.body')
          # Build the final JSON template using jq (handles all escaping correctly)
          # The handlebars action will render it, but since there are no {{ }} vars,
          # it passes through unchanged.
          jq -n \
            --arg version "$VERSION" \
            --arg tag "$TAG" \
            --arg body "$RELEASE_BODY" \
            '{
              title: "Open Godot MCP",
              description: "Open-source MCP (Model Context Protocol) bridge for AI-driven Godot development, testing, and debugging.\n\nLets AI agents (Claude, GPT, etc.) control the Godot editor and runtime via a WebSocket bridge:\n- Scene/node manipulation, script editing, resource management\n- Deterministic playtesting, input injection, screenshot capture\n- Network condition simulation, multiplayer testing\n- C# project support, LSP integration, profiler access\n- In-editor dock with one-click update notifications\n- Agnes/NVIDIA AI API integration (vision, image gen, video gen)\n- Process lifecycle management (parent watchdog, --shutdown-all)\n- Screenshot cleanup UI, project-level config\n\nCompanion Python MCP server: pip install open-godot-mcp\n\nDocs: https://github.com/masteryee-labs/Open-Godot-MCP/tree/main/Docs\n\n--- Latest update (\($version)) ---\n\($body)",
              category_id: "5",
              godot_version: "4.3",
              version_string: $version,
              cost: "MIT",
              download_provider: "Custom",
              download_commit: "https://github.com/masteryee-labs/Open-Godot-MCP/releases/download/\($tag)/open-godot-mcp-plugin.zip",
              browse_url: "https://github.com/masteryee-labs/Open-Godot-MCP",
              issues_url: "https://github.com/masteryee-labs/Open-Godot-MCP/issues",
              icon_url: "https://raw.githubusercontent.com/masteryee-labs/Open-Godot-MCP/main/Docs/assets/icon.png",
              download_url: "https://github.com/masteryee-labs/Open-Godot-MCP/releases/download/\($tag)/open-godot-mcp-plugin.zip"
            }' > .github/asset-template-rendered.json
          echo "Template built. Preview:"
          jq . .github/asset-template-rendered.json | head -5

      - name: Submit asset edit to Godot Asset Library
        uses: deep-entertainment/godot-asset-lib-action@v0.6.0
        with:
          username: ${{ secrets.GODOT_ASSET_LIB_USER }}
          password: ${{ secrets.GODOT_ASSET_LIB_PASSWORD }}
          assetId: "5360"
          assetTemplate: .github/asset-template-rendered.json
