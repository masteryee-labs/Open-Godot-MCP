name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish (e.g. v0.1.8)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-plugin-zip:
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build plugin ZIP
        run: |
          # Create the plugin ZIP with the correct structure:
          # addons/open_godot_mcp/... (all addon files)
          # Exclude .uid files for .tscn/.gd that are editor-specific
          # but keep .uid files so Godot 4.5+ can resolve quickly.
          cd "$GITHUB_WORKSPACE"
          zip -r open-godot-mcp-plugin.zip \
            addons/open_godot_mcp/ \
            -x "addons/open_godot_mcp/*.bak.*" \
            -x "addons/open_godot_mcp/**/*.bak.*"

      - name: Generate SHA-256 checksum
        run: |
          sha256sum open-godot-mcp-plugin.zip > open-godot-mcp-plugin.zip.sha256

      - name: Upload plugin ZIP to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            open-godot-mcp-plugin.zip
            open-godot-mcp-plugin.zip.sha256

  publish-to-asset-library:
    needs: build-plugin-zip
    if: always() && (github.event_name == 'workflow_dispatch' || needs.build-plugin-zip.result == 'success')
    runs-on: ubuntu-latest
    name: Publish to Godot Asset Library
    steps:
      - uses: actions/checkout@v4

      - name: Extract version and release notes from tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          VERSION="${TAG#v}"
          echo "TAG=$TAG" >> "$GITHUB_ENV"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          # Fetch release body (notes) via GitHub CLI, then JSON-escape it
          # (strip surrounding quotes from jq output so handlebars can inline it)
          RELEASE_BODY=$(gh release view "$TAG" --json body --jq '.body' | jq -Rs 'tojson | .[1:-1]')
          {
            echo "RELEASE_BODY<<EOF_DELIMITER"
            echo "$RELEASE_BODY"
            echo "EOF_DELIMITER"
          } >> "$GITHUB_ENV"

      - name: Submit asset edit to Godot Asset Library
        uses: deep-entertainment/godot-asset-lib-action@v0.6.0
        with:
          username: ${{ secrets.GODOT_ASSET_LIB_USER }}
          password: ${{ secrets.GODOT_ASSET_LIB_PASSWORD }}
          assetId: "5360"
          assetTemplate: .github/asset-template.json.hb
